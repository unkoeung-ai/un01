<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Kantumruy Pro',sans-serif;

body{
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:radial-gradient(circle at center,#1e1b4b 0%,#0f172a 100%);
    padding:20px;

.card{
    width:100%;
    max-width:550px;
    background:rgba(30,41,59,.7);
    backdrop-filter:blur(20px);
    border:1px solid rgba(255,255,255,.1);
    border-radius:28px;
    padding:40px 30px;
    color:#f8fafc;
}

.title{
    text-align:center;
    font-size:28px;
    font-weight:700;
    margin-bottom:10px;
    color:#facc15;
}

.subtitle{
    text-align:center;
    color:#cbd5e1;
    margin-bottom:30px;
}

input{
    width:100%;
    padding:16px;
    border:none;
    outline:none;
    border-radius:16px;
    background:#0f172a;
    color:white;
    text-align:center;
    font-size:18px;
    margin-bottom:20px;
}

button{
    width:100%;
    padding:16px;
    border:none;
    border-radius:16px;
    background:#16a34a;
    color:white;
    font-size:18px;
    cursor:pointer;
    transition: background 0.2s;
}

button:hover{
    background:#15803d;
}

.result{
    display:none;
    margin-top:25px;
    padding:25px;
    border-radius:20px;
    background:rgba(255,255,255,.05);
}

.result-heading{
    text-align:center;
    color:#94a3b8;
}

.number{
    font-size:55px;
    text-align:center;
    color:#facc15;
    margin-top:10px;
}

.type{
    text-align:center;
    margin:15px auto;
    width:max-content;
    padding:8px 20px;
    border-radius:30px;
    font-size:20px;
    font-weight:600;
}

.type-good{
    background:rgba(34,197,94,.15);
    color:#4ade80;
}

.type-normal{
    background:rgba(250,204,21,.15);
    color:#facc15;
}

.type-bad{
    background:rgba(239,68,68,.15);
    color:#f87171;
}

.detail{
    text-align:center;
    line-height:1.8;
    color:#e2e8f0;
}

.footer{
    margin-top:25px;
    text-align:center;
    color:#94a3b8;
}

</div>

type="tel"
id="phone"
placeholder="ឧទាហរណ៍៖ 012345678"

function predictPhone() {
    let phone = document.getElementById("phone").value.replace(/\D/g,'');

    if (phone.length < 6) {
        alert("សូមបញ្ចូលលេខទូរស័ព្ទយ៉ាងតិច 6 ខ្ទង់");
        return;
    }

    let last6 = phone.slice(-6);
    let divide = Number(last6) / 80;
    let decimal = divide - Math.floor(divide);
    let result = Math.ceil(decimal * 80);

    if (result === 0) {
        result = 80;
    }

    let data = results[result];

    if (!data) {
        data = {
            type: "មិនទាន់មានទិន្នន័យ",
            desc: "សូមបន្ថែមលទ្ធផលលេខនេះ"
        };
    }

    let statusElement = document.getElementById("status");
    statusElement.className = "type";

    if (data.type === "ល្អ" || data.type === "ល្អណាស់") {
        statusElement.classList.add("type-good");
    } else if (data.type === "អាក្រក់" || data.type === "អាក្រក់ណាស់") {
        statusElement.classList.add("type-bad");
    } else {
        statusElement.classList.add("type-normal");
    }

    document.getElementById("resultBox").style.display = "block";
    document.getElementById("finalNumber").innerHTML = result;
    document.getElementById("status").innerHTML = data.type;
    document.getElementById("description").innerHTML = data.desc;
}
