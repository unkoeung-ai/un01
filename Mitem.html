<!DOCTYPE html>
<html lang="km">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ក្បួនទស្សន៍ទាយលេខទូរស័ព្ទ</title>

<link href="https://fonts.googleapis.com/css2?family=Kantumruy+Pro:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
    /* ទម្រង់ទូទៅ (Global Reset) */
    * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: 'Kantumruy Pro', sans-serif;
    }

    body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        /* ប្តូរពណ៌ Background ឱ្យមានទំងន់ និងស៊ីជម្រៅជាងមុន */
        background: radial-gradient(circle at center, #1e1b4b 0%, #0f172a 100%);
        padding: 20px;
        overflow-x: hidden;
    }

    /* បន្ថែមពន្លឺព្រិលៗនៅខាងក្រោយកាត (Glow Effects) */
    body::before {
        content: '';
        position: absolute;
        width: 300px;
        height: 300px;
        background: #3b82f6;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.2;
        top: 20%;
        left: 25%;
        z-index: 0;
    }

    body::after {
        content: '';
        position: absolute;
        width: 300px;
        height: 300px;
        background: #a855f7;
        border-radius: 50%;
        filter: blur(120px);
        opacity: 0.2;
        bottom: 20%;
        right: 25%;
        z-index: 0;
    }

    /* កាតមេ (Main Card Container) */
    .card {
        width: 100%;
        max-width: 550px;
        background: rgba(30, 41, 59, 0.7);
        backdrop-filter: blur(20px);
        -webkit-backdrop-filter: blur(20px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 28px;
        padding: 40px 30px;
        color: #f8fafc;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        position: relative;
        z-index: 1;
    }

    /* ចំណងជើង */
    .title {
        text-align: center;
        font-size: 28px;
        font-weight: 700;
        margin-bottom: 12px;
        background: linear-gradient(to right, #fef08a, #facc15);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        letter-spacing: 0.5px;
    }

    .subtitle {
        text-align: center;
        font-size: 15px;
        color: #cbd5e1;
        opacity: 0.85;
        margin-bottom: 30px;
        font-weight: 300;
    }

    .input-box {
        margin-bottom: 20px;
        position: relative;
    }

    /* ប្រអប់បញ្ចូលលេខទូរស័ព្ទ */
    input {
        width: 100%;
        padding: 16px 20px;
        border: 2px solid rgba(255, 255, 255, 0.05);
        outline: none;
        border-radius: 16px;
        font-size: 18px;
        background: rgba(15, 23, 42, 0.6);
        color: #ffffff;
        text-align: center;
        letter-spacing: 2px;
        transition: all 0.3s ease;
    }

    input:focus {
        border-color: #3b82f6;
        box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        background: rgba(15, 23, 42, 0.8);
    }

    input::placeholder {
        color: #94a3b8;
        letter-spacing: 0px;
        font-size: 16px;
    }

    /* ប៊ូតុងចុច */
    button {
        width: 100%;
        padding: 16px;
        border: none;
        border-radius: 16px;
        background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
        color: white;
        font-size: 18px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        box-shadow: 0 4px 12px rgba(34, 197, 94, 0.2);
    }

    button:hover {
        transform: translateY(-2px);
        box-shadow: 0 8px 20px rgba(34, 197, 94, 0.4);
        filter: brightness(1.1);
    }

    button:active {
        transform: translateY(1px);
    }

    /* ប្រអប់បង្ហាញលទ្ធផល */
    .result {
        display: none;
        margin-top: 30px;
        background: linear-gradient(135deg, rgba(255, 255, 255, 0.08) 0%, rgba(255, 255, 255, 0.03) 100%);
        border: 1px solid rgba(255, 255, 255, 0.08);
        padding: 25px;
        border-radius: 20px;
        /* ចលនាពេលលទ្ធផលលោតចេញមក */
        animation: slideDown 0.5s ease forwards;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-10px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .result-heading {
        text-align: center;
        font-size: 14px;
        text-transform: uppercase;
        color: #94a3b8;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .number {
        font-size: 55px;
        font-weight: 700;
        color: #facc15;
        text-align: center;
        line-height: 1;
        margin-bottom: 10px;
        text-shadow: 0 0 20px rgba(250, 204, 21, 0.3);
    }

    /* ពណ៌ផ្អែកលើប្រភេទលទ្ធផល (នឹងគ្រប់គ្រងតាមរយៈ JS) */
    .type {
        text-align: center;
        font-size: 20px;
        font-weight: 600;
        padding: 4px 16px;
        border-radius: 30px;
        width: max-content;
        margin: 10px auto;
    }
    
    /* ថ្នាក់ពណ៌ជំនួយសម្រាប់ប្រភេទលទ្ធផល */
    .type-good { background: rgba(34, 197, 94, 0.15); color: #4ade80; }
    .type-normal { background: rgba(250, 204, 21, 0.15); color: #140ad2; }
    .type-bad { background: rgba(239, 68, 68, 0.15); color: #fca5a5; }

    .detail {
        margin-top: 15px;
        line-height: 1.7;
        text-align: center;
        color: #e2e8f0;
        font-size: 16px;
    }

    /* បាតក្រោម (Footer) */
    .footer {
        margin-top: 30px;
        text-align: center;
        color: #94a3b8;
        font-size: 13px;
        font-weight: 300;
        border-top: 1px solid rgba(255, 255, 255, 0.05);
        padding-top: 15px;
    }
</style>
</head>

</div>

function predictPhone(){
    let phone = document.getElementById("phone").value.replace(/\D/g,'');

    if(phone.length < 6){
        alert("សូមបញ្ចូលលេខទូរស័ព្ទយ៉ាងតិច 6 ខ្ទង់");
        return;
    }

    let last6 = phone.slice(-6);
    let divide = Number(last6) / 80;
    let decimal = divide - Math.floor(divide);
    let result = Math.ceil(decimal * 80);

    if(result === 0){
        result = 80;
    }

    let data = results[result];

    if(!data){
        data = { type:"មិនទាន់មានទិន្នន័យ", desc:"សូមបន្ថែមលទ្ធផលលេខនេះ" };
    }

    let statusElement = document.getElementById("status");
    statusElement.className = "type"; // reset class ចាស់
    
    if(data.type.includes("ល្អ")) {
        statusElement.classList.add("type-good");
    } else if(data.type.includes("អាក្រក់")) {
        statusElement.classList.add("type-bad");
    } else {
        statusElement.classList.add("type-normal");
    }

    // បង្ហាញលទ្ធផលជាមួយនឹង Effect លោតចេញមកឡើងវិញរាល់ពេលចុច
    let resultBox = document.getElementById("resultBox");
    resultBox.style.display = "none";
    setTimeout(() => {
        resultBox.style.display = "block";
    }, 10);

    document.getElementById("finalNumber").innerHTML = result;
    statusElement.innerHTML = data.type;
    document.getElementById("description").innerHTML = data.desc;
}
</script>
