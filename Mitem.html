<!DOCTYPE html>
<html lang="km">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Phone Fortune Predictor</title>
    <link href="https://fonts.googleapis.com/css2?family=Hanuman:wght@400;700&family=Kantumruy+Pro:wght@400;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, 'Hanuman', sans-serif;
            background: #0b1120;
            color: #e5e7eb;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 650px;
            text-align: center;
        }

        .main-title {
            font-size: 42px;
            font-weight: bold;
            color: #ffffff;
            margin-bottom: 12px;
            letter-spacing: 0.5px;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .sub-title {
            color: #94a3b8;
            font-size: 15px;
            margin-bottom: 45px;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .predict-card {
            background: linear-gradient(180deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 24px;
            padding: 40px 35px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            text-align: left;
        }

        .card-header {
            text-align: center;
            font-size: 22px;
            color: #ffffff;
            font-weight: bold;
            margin-bottom: 25px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .message-box {
            padding: 14px 16px;
            border-radius: 12px;
            margin-bottom: 22px;
            font-weight: bold;
            font-size: 14px;
            display: none; 
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .success {
            background: rgba(34,197,94,0.12);
            color: #86efac;
            border: 1px solid rgba(34,197,94,0.18);
        }

        .error {
            background: rgba(239,68,68,0.12);
            color: #fca5a5;
            border: 1px solid rgba(239,68,68,0.18);
        }

        .form-group {
            margin-bottom: 22px;
        }

        .form-group label {
            display: block;
            margin-bottom: 12px;
            color: #ffffff;
            font-weight: bold;
            font-size: 15px;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .form-group input {
            width: 100%;
            padding: 16px 18px;
            border-radius: 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: #0f172a;
            color: #ffffff;
            outline: none;
            font-size: 18px;
            letter-spacing: 1px;
            transition: border-color 0.3s;
            text-align: center;
        }

        .form-group input:focus {
            border-color: rgba(96,165,250,0.45);
        }

        .btn-submit {
            width: 100%;
            padding: 15px 24px;
            border: none;
            border-radius: 14px;
            font-weight: bold;
            font-size: 16px;
            font-family: 'Kantumruy Pro', sans-serif;
            cursor: pointer;
            background: linear-gradient(135deg, #0ea5e9, #2563eb);
            color: white;
            box-shadow: 0 8px 20px rgba(14,165,233,0.2);
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn-submit:hover {
            transform: translateY(-1px);
            box-shadow: 0 10px 25px rgba(14,165,233,0.3);
        }

        .result-display {
            margin-top: 30px;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            padding: 22px;
            display: none; 
        }

        .result-number {
            display: inline-block;
            padding: 6px 14px;
            background: rgba(6, 182, 212, 0.15);
            color: #22d3ee;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
            margin-bottom: 14px;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .result-text {
            color: #e2e8f0;
            font-size: 16px;
            line-height: 1.6;
            font-family: 'Kantumruy Pro', sans-serif;
        }

        .result-text span {
            color: #60a5fa;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h1 class="main-title">Phone Fortune Predictor</h1>
    <p class="sub-title">កម្មវិធីទស្សន៍ទាយជោគជតារាសីតាមលេខទូរស័ព្ទ (បែបចិន) - បង្កើតឡើងដោយកូដ JavaScript</p>

    <div class="predict-card">
        <div class="card-header">
            🔮 ពិនិត្យលេខទូរស័ព្ទរបស់អ្នក 🔮
        </div>

        <div id="success-box" class="message-box success"></div>
        <div id="error-box" class="message-box error"></div>

        <form id="fortuneForm" onsubmit="predictFortune(event)">
            <div class="form-group">
                <label for="phone_number">បញ្ចូលលេខទូរស័ព្ទ</label>
                <input type="text" id="phone_number" name="phone_number" placeholder="ឧទហរណ៍៖ 012345678" maxlength="12" autocomplete="off">
            </div>
            <button type="submit" class="btn-submit">គណនាផលទស្សន៍ទាយ</button>
        </form>

        <div id="result-display" class="result-display">
            <div id="result-number" class="result-number"></div>
            <div class="result-text">
                <strong>ទំនាយពោលថា៖</strong> <span id="result-text-content"></span>
            </div>
        </div>
    </div>
</div>

<script>
const rules = {
    1: "ល្អណាស់ = រីកចំរើនល្អអាចទទួលបានជ័យជំនះ",
    2: "ធម្មតា = 有លាភមានបង់មិនទទួលផលអ្វីទេ",
    3: "ល្អណាស់ = មានភាពរីកចំរើនអ្វីៗអាចសំរេចបានដូចបំណង",
    4: "អាក្រក់ = ផ្លូវអនាគតមានឧបសគ្គច្រើនលំបាកវេទនា",
    5: "ល្អណាស់ = រកស៊ីមានបានទទួលបានទាំងកិត្តិយសទាំងផលប្រយោជន៍",
    6: "ល្អណាស់ = 有សំណាងច្រើនអាចទទួលបានគុណសម្បត្តិធំ",
    7: "ល្អ = មានចិត្តអត់ធ្ត់ពិតជាអាចទទួលបានជោគជ័យដ៏ធំ",
    8: "ល្អ = អាចមានឱកាសទទួលបានជោគជ័យ",
    9: "អាក្រក់ = ឯកកោ គ្មានអ្នកជួយពិបាកទទួលទ្រព្យមកវិញ",
    10: "អាក្រក់ = ខាតបង់ទឹកចិត្តនិងកម្លាំងទទេ ខិតខំដោយឥតបានផល",
    11: "ល្អ = មានលំនឹងល្អអ្នកដទៃស្ងើចសរសើរ",
    12: "អាក្រក់ = ទន់ខ្សោយធ្វើអ្វីក៏មិនបានសម្រេចដែរ",
    13: "ល្អណាស់ = មានសំណាងល្អក្តីសង្ឃឹមច្រើន",
    14: "ធម្មតា = ជ័យជំនះ ឬបរាជ័យពឹងផ្អែកលើការតាំងចិត្តរបស់ខ្លួន",
    15: "ល្អ = ជ័យជំនះច្រើនមានការរីកចម្រើន",
    16: "ល្អណាស់ = អាចសម្រេចកិច្ចការធំបានទទួលទាំងកិត្តិយសទាំងផលប្រយោជន៍",
    17: "ល្អ = មានអ្នកធំជួយអាចទទួលបានជោគជ័យ",
    18: "ល្អ = មានភាពរីកចម្រើននឹងបានសម្រេចដូចបំណង",
    19: "អាក្រក់ = មានទំនាស់ច្រើនមានឧបសគ្គគ្រប់ជំពូក",
    20: "អាក្រក់ = ឧបសគ្គច្រើនឈឺច្រើនពិបាកចិត្តច្រើន",
    21: "ល្អ = ធ្វើការល្អិតល្អន់មានប្រាជ្ញា",
    22: "អាក្រក់ណាស់ = ខាតបង់លាភធ្វើអ្វីក៏មិនបានសម្រេចដូចបំណងដែរ",
    23: "ល្អណាស់ = កិត្តិយសល្អសម្រេចកិច្ចការធំបាន",
    24: "ធម្មតា = ពឹងផ្អែកលើសមត្ថភាពផ្ទាល់ខ្លួនអាចសម្រេចកិច្ចការបាន",
    25: "ល្អណាស់ = មានសំណាងល្អមានគេជួយ",
    26: "អាក្រក់ណាស់ = មានឧបសគ្គច្រើន",
    27: "ល្អ = អាចមានលាភសំណាងនិងជ័យជំនះ",
    28: "ល្អណាស់ = រាសីឡើងខ្ពស់រកស៊ីមានបាន",
    29: "អាក្រក់ = សំណាងល្អនិងអាក្រក់ កើតមានឡើងព្រមគ្នា",
    30: "ល្អណាស់ = ទទួលបាននូវលាភសំណាងនិងកិត្តិយស",
    31: "ល្អណាស់ = មានសំណាងអាចទទួលជោគជ័យ",
    32: "ល្អ = មានប្រាជ្ញាឈ្លាសវៃមានភាពរីកចម្រើនច្រើន",
    33: "អាក្រក់ណាស់ = ជួបឧបសគ្គមិនចេះអស់ពិបាកនឹងទទួលបានជោគជ័យ",
    34: "ធម្មតា = ត្រូវមានលំនឹងចិត្តកុំលោភលន់",
    35: "អាក្រក់ = ឧបសគ្គច្រើនតែជួបភាពលំបាក និងក្រខ្សត់",
    36: "ល្អ = ឧបសគ្គអាចក្លាយជាសំណាងធ្វើអ្វីៗអាចបានដូចបំណង",
    37: "ធម្មតា = អាចទទួលបាននូវកិត្តិយសតែពិបាកទទួលនូវលាភសំណាង",
    38: "ល្អណាស់ = អនាគតភ្លឺស្វាងត្រចះត្រចង់",
    39: "ធម្មតា = មានសំណាងឬឧបសគ្គមានមិនទៀង",
    40: "ល្អណាស់ = មានសំណាងល្អអនាគតល្អហើយភ្លឺស្វាង ត្រចះត្រចង់",
    41: "អាក្រក់ = ការរកស៊ីត្រូវខាតបង់",
    42: "ល្អ = បើមានចិត្តអត់ធ្មត់សំណាងអាក្រក់ អាចក្លាយជាមានលាភ",
    43: "អាក្រក់ = រឿងអ្វីៗពិបាកសម្រេចដូចបំណងប្រាថ្នា",
    44: "ល្អ = មានសំណាងមានភាពរីកចម្រើន",
    45: "ល្អណាស់ = ជួបឧបសគ្គ មិនចេះអស់",
    46: "ល្អណាស់ = មានគេតាមជួយថែរក្សា អាចប្រកបមុខជំនួញបាន",
    47: "ល្អណាស់ = មានទាំងកិត្តិយសមានទាំងទ្រព្យសម្បត្តិ",
    48: "ធម្មតា = មានឧបសគ្គហើយក៏មានសំណាងដែរ",
    49: "ធម្មតា = មានឧបសគ្គហើយក៏មានសំណាងដែរ",
    50: "ធម្មតា = លាភសំណាងនិងឧបសគ្គគឺមកមិនទៀង",
    51: "ល្អ = ខិតខំនិងទទួលបានជោគជ័យ",
    52: "អាក្រក់ = ពេលបានលាភសំណាងនិងមានឧបសគ្គតាមមកពីក្រោយ",
    53: "ធម្មតា = ខិតខំប្រឹងប្រែងខ្លាំងតែទទួលបានលទ្ធផលតិចតួច",
    54: "អាក្រក់ = ល្អតែសំបកក្រៅតែតាមការពិតមានឧបសគ្គ និងគ្រោះថ្នាក់",
    55: "អាក្រក់ណាស់ = ជួបឧបសគ្គ មិនចេះអស់អាចមានគ្រោះថ្នាក់",
    56: "ធម្មតា = ខិតខំប្រឹងប្រែងអាចកែប្រែនូវជោគវាសនា",
    57: "ធម្មតា = មានឧបសគ្គច្រើន តែសំណាងល្អនឹងមកពីក្រោយ",
    58: "អាក្រក់ = ពេលជួបនិងបញ្ហាចិត្តមិននឹងនរពិបាកសម្រេចចិត្ត",
    59: "ធម្មតា = ចិត្តច្របូកច្របល់ពិបាកសម្រេចចិត្ត",
    60: "អាក្រក់ = ជួបឧបសគ្គច្រើន",
    61: "អាក្រក់ = មានរឿងស្មុគស្មាញច្រើនពិបាកសម្រេចអ្វីៗដែលបានប៉ងទុក",
    62: "ល្អ = ខិតខំនិងទទួលបាននូវផលប្រយោជន៍",
    63: "អាក្រក់ = ខិតខំ តែគ្មានទទួលបានផលប្រយោជន៍អ្វីឡើយ",
    64: "ល្អ = មានសំណាងល្អអាចប្រកបមុខជំនួញធំបាន",
    65: "ធម្មតា = ល្អ តែខ្វះទំនុកចិត្តលើខ្លួនឯង",
    66: "ល្អណាស់ = ធ្វើអ្វីៗតែងបានសម្រេចមាសប្រាក់ហូរចូលច្រើន",
    67: "ល្អ = ប្រសិនបើអាចក្តាប់ជាប់នូវឱកាសល្អអាចទទួលបានជោគជំនះ",

    79: "អាក្រក់ = បានហើយតែប្រែជាខាតបង់ទៅវិញខិតខំឥតប្រយោជន៍",

};

function predictFortune(event) {
    event.preventDefault();

    let phoneInput = document.getElementById("phone_number").value.replace(/\D/g, '');

    const successBox = document.getElementById("success-box");
    const errorBox = document.getElementById("error-box");
    const resultDisplay = document.getElementById("result-display");
    const resultNumDiv = document.getElementById("result-number");
    const resultTextSpan = document.getElementById("result-text-content");

    successBox.style.display = "none";
    errorBox.style.display = "none";
    resultDisplay.style.display = "none";

    if (phoneInput === "") {
        errorBox.textContent = "សូមបញ្ចូលលេខទូរស័ព្ទរបស់អ្នក!";
        errorBox.style.display = "block";
        return;
    }

    if (phoneInput.length < 9 || phoneInput.length > 11) {
        errorBox.textContent = "សូមបញ្ចូលលេខទូរស័ព្ទឱ្យបានត្រឹមត្រូវ (៩ ទៅ ១១ ខ្ទង់)!";
        errorBox.style.display = "block";
        return;
    }
    let last6Digits = phoneInput.slice(-6);

    let resultNum = (parseInt(last6Digits, 10) % 80) || 80;

    if (rules[resultNum]) {
        successBox.textContent = "គណនាលេខវាសនាបានជោគជ័យ!";
        successBox.style.display = "block";

        resultNumDiv.textContent = "លទ្ធផលលេខកូដ៖ លេខ " + resultNum;
        resultTextSpan.textContent = rules[resultNum];
        resultDisplay.style.display = "block";
    }
}
